# AI-Agent Oracle Lottery — full local bring-up.
#
#   docker compose up            # DEMO: anvil + deploy + relayer + 1 agent + showcase
#   LOTTERY_MODE=uni docker compose up    # add the $100/week external benefactor
#
# Then open the showcase at http://localhost:5182 and the live economy JSON at
# http://localhost:8090/economy. To feed the Alien Monitor, set MONITOR_URL.
#
# Keys below are the well-known anvil mnemonic accounts ("test … junk") — DEMO ONLY.
# For LIVE value, deploy with real distinct keys (see docs/README.md → Deployment).

name: ailottery

x-anvil-mnemonic: &mnemonic "test test test test test test test test test test test junk"

services:
  chain:
    build: { context: ./contracts, dockerfile: Dockerfile }
    image: ailottery-contracts:local
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--chain-id", "31337", "--block-time", "1",
              "--accounts", "12", "--balance", "100000", "--mnemonic", *mnemonic, "--silent"]
    # internal only (reachable as chain:8545); not published, so it won't clash with a local anvil
    expose: ["8545"]
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 3s
      timeout: 3s
      retries: 20
    networks: [lottery]

  deploy:
    build: { context: ./contracts, dockerfile: Dockerfile }
    image: ailottery-contracts:local
    depends_on:
      chain: { condition: service_healthy }
    environment:
      RPC_URL: http://chain:8545
      LOTTERY_ADDRESS_FILE: /shared/lottery.address
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"  # acct[0] = admin/governance/operator/signer/treasury
      TICKET_PRICE: "1000000000000000"   # 0.001 ETH (== $1 at WEI_PER_USD below)
      ENTRY_WINDOW: "120"
      MIN_DRAW_DELAY: "2"
      PRIZE_BPS: "8000"     # of TOTAL income (tickets + donations); prize floor 70%
      OPEX_BPS: "2000"      # lottery-owned opex share (the AI Treasurer's budget)
      OPERATOR_BPS: "0"     # folded into opex
      ONCHAIN_VDF: "false"
      ADMIN_TRANSFER_DELAY: "0"
    volumes:
      - shared:/shared
      - ../contracts/evm/lib:/libs:ro   # monorepo vendored OZ 5.6.1 (ignored/empty on the satellite → forge install)
    networks: [lottery]
    restart: "no"

  relayer:
    build: { context: ./relayer, dockerfile: Dockerfile }
    image: ailottery-relayer:local
    depends_on:
      deploy: { condition: service_completed_successfully }
    environment:
      LOTTERY_MODE: ${LOTTERY_MODE:-demo}
      RPC_URL: http://chain:8545
      CHAIN_ID: "31337"
      LOTTERY_ADDRESS_FILE: /shared/lottery.address
      OPERATOR_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"  # acct[0]
      SPONSOR_KEY: "0xdbda1821b80551c9d65939329250298aa3472ba22feea921c0cf5d620ea67b97"   # acct[8] = "the Hub"
      BENEFACTOR_KEY: "0x2a871d0798f97d79848a013d4936a73bf4cc922c825d33c1cf7073dff6d409c6" # acct[9] = "unknown benefactor"
      AGENT_KEYS: "0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a,0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6,0x47e179ec197488593b187f80a00eb0da91f1b9d0b13f8733639f19c30a34926a,0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba,0x92db14e403b83dfe3df233f83dfa3a0d7096f21ca9b0d6d6b8d88b2b4ec1564e"  # acct[2..6] synthetic crowd
      SPONSOR_YAML: /app/config/sponsor.yaml
      ECONOMICS_YAML: /app/config/economics.yaml
      # The Hub OWNS the tithe (donor's generosity). These mirror the Hub's own
      # AIMARKET_CHARITY_* config; the relayer reads them + enforces the binding.
      AIMARKET_CHARITY_ENABLED: "1"
      AIMARKET_CHARITY_TITHE_BPS: "2000"   # 20% of the Hub's routing-fee revenue
      AIMARKET_CHARITY_INTERVAL_HOURS: "24"  # the Hub PUSHES the accrued tithe every 24h (never pulled)
      DEMO_TITHE_INTERVAL_S: "15"          # accelerated so the schedule is visible in the demo
      # Lottery-owned opex / AI Treasurer policy (split lives on-chain via OPEX_BPS above)
      TREASURER_ENABLED: "1"
      TREASURER_MODE: policy               # policy | llm
      RESERVE_TARGET_USD: "5"
      WEI_PER_USD: "1000000000000000"   # $1 = 0.001 ETH (display + USD→wei)
      HUB_ROUTING_REVENUE_USD: "5"
      UNI_WEEKLY_USD: "100"
      SELL_WINDOW: "4"
      ROUND_INTERVAL: "5"
      MONITOR_URL: ${MONITOR_URL:-http://alien-monitor:9100}
    ports: ["127.0.0.1:8090:8090"]
    volumes:
      - shared:/shared:ro
      - ./config:/app/config:ro
    networks: [lottery, ecosystem]
    restart: unless-stopped

  agent:
    build: { context: ./agent, dockerfile: Dockerfile }
    image: ailottery-agent:local
    depends_on:
      relayer: { condition: service_healthy }
    environment:
      RPC_URL: http://chain:8545
      CHAIN_ID: "31337"
      AGENT_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"  # acct[1] = external participant
      LOTTERY_ADDRESS_FILE: /shared/lottery.address
      RELAYER_URL: http://relayer:8090
      TICKETS: "2"
      POLL: "3"
    volumes:
      - shared:/shared:ro
    networks: [lottery]
    restart: unless-stopped

  showcase:
    image: node:20-alpine
    working_dir: /app
    command: ["node", "serve.mjs"]
    environment:
      PORT: "5182"
    ports: ["127.0.0.1:5182:5182"]
    volumes:
      - ./frontend:/app:ro
    networks: [lottery]
    restart: unless-stopped

volumes:
  shared:

networks:
  lottery:
    driver: bridge
  ecosystem:
    external: true
    name: ecosystem_ecosystem
