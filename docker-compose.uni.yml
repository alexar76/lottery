# UNI-mode lottery relayer — uses Alien Monitor's embedded Anvil (host :8545)
# and pushes live economy to Monitor :9100. Port 9195 avoids mesh :8090.
#
#   ./scripts/deploy_lottery_uni.sh
#
# Requires: alien-monitor UNI bootstrap done (evm_lottery in /api/health).

name: ailottery-uni

x-anvil-mnemonic: &mnemonic "test test test test test test test test test test test junk"

services:
  relayer:
    build: { context: ./relayer, dockerfile: Dockerfile }
    image: ailottery-relayer:uni
    container_name: ailottery-relayer-uni
    network_mode: host
    environment:
      LOTTERY_MODE: uni
      RPC_URL: ${RPC_URL:-http://127.0.0.1:8545}
      CHAIN_ID: ${CHAIN_ID:-31337}
      LOTTERY_ADDRESS: ${LOTTERY_ADDRESS}
      HUB_LOTTERY_ADDRESS: ${HUB_LOTTERY_ADDRESS:-${LOTTERY_ADDRESS}}
      OPERATOR_KEY: ${OPERATOR_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      ORACLE_SIGNER_KEY: ${ORACLE_SIGNER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      TREASURY_KEY: ${TREASURY_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      SPONSOR_KEY: ${SPONSOR_KEY:-0xdbda1821b80551c9d65939329250298aa3472ba22feea921c0cf5d620ea67b97}
      BENEFACTOR_KEY: ${BENEFACTOR_KEY:-0x2a871d0798f97d79848a013d4936a73bf4cc922c825d33c1cf7073dff6d409c6}
      AGENT_KEYS: ${AGENT_KEYS:-0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a,0x7c852118294e51e653712a81e05800f419141751be58f605c371e15141b007a6,0x47e179ec197488593b187f80a00eb0da91f1b9d0b13f8733639f19c30a34926a,0x8b3a350cf5c34c9194ca85829a2df0ec3153be0318b5e2d3348e872092edffba,0x92db14e403b83dfe3df233f83dfa3a0d7096f21ca9b0d6d6b8d88b2b4ec1564e}
      SPONSOR_YAML: /app/config/sponsor.yaml
      ECONOMICS_YAML: /app/config/economics.yaml
      HUB_CHARITY_ENABLED: "1"
      HUB_TITHE_BPS: ${HUB_TITHE_BPS:-2000}
      DEMO_TITHE_INTERVAL_S: ${DEMO_TITHE_INTERVAL_S:-12}
      TREASURER_ENABLED: "1"
      TREASURER_MODE: policy
      RESERVE_TARGET_USD: "5"
      WEI_PER_USD: "1000000000000000"
      HUB_ROUTING_REVENUE_USD: "5"
      UNI_WEEKLY_USD: "100"
      SELL_WINDOW: "3"
      ROUND_INTERVAL: "4"
      FAST_FORWARD: "true"
      ONCHAIN_VDF: "false"
      MONITOR_URL: ${MONITOR_URL:-http://127.0.0.1:9100}
      MONITOR_TOKEN: ${MONITOR_TOKEN:-${ALIEN_API_TOKEN:-}}
      SERVE_HOST: 0.0.0.0
      SERVE_PORT: ${LOTTERY_RELAYER_PORT:-9195}
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
