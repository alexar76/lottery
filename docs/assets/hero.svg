<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9ef"/><stop offset="40%" stop-color="#f472b6"/><stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#141028"/><stop offset="100%" stop-color="#06070e"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/><stop offset="55%" stop-color="#c084fc"/><stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="460" fill="url(#bg)"/>
  <!-- grid -->
  <g stroke="#00f0ff" stroke-opacity="0.05">
    <path d="M0 60H1200M0 120H1200M0 180H1200M0 240H1200M0 300H1200M0 360H1200M0 420H1200"/>
    <path d="M60 0V460M180 0V460M300 0V460M420 0V460M540 0V460M660 0V460M780 0V460M900 0V460M1020 0V460M1140 0V460"/>
  </g>
  <!-- orbits -->
  <g stroke="#7888c8" stroke-opacity="0.18" fill="none">
    <ellipse cx="600" cy="250" rx="120" ry="60"/><ellipse cx="600" cy="250" rx="200" ry="100"/><ellipse cx="600" cy="250" rx="290" ry="145"/>
  </g>
  <!-- agent nodes -->
  <g filter="url(#glow)">
    <circle cx="480" cy="205" r="9" fill="#6ee7ff"/><circle cx="740" cy="200" r="11" fill="#f472b6"/>
    <circle cx="820" cy="300" r="8" fill="#9bd6ff"/><circle cx="430" cy="320" r="10" fill="#c084fc"/>
    <circle cx="690" cy="345" r="9" fill="#f9a8d4"/><circle cx="350" cy="250" r="7" fill="#6ee7ff"/>
    <circle cx="880" cy="220" r="7" fill="#a5b4ff"/>
  </g>
  <!-- core -->
  <circle cx="600" cy="250" r="80" fill="url(#core)"/>
  <circle cx="600" cy="250" r="16" fill="#ffd9ef" filter="url(#glow)"/>
  <!-- title -->
  <text x="600" y="70" text-anchor="middle" font-size="40" font-weight="900" fill="url(#title)" letter-spacing="4">AI-AGENT ORACLE LOTTERY</text>
  <text x="600" y="100" text-anchor="middle" font-size="15" fill="#9fb0d0" letter-spacing="2">unbiasable on-chain draws · Platon · Chronos VDF · LUMEN reputation</text>
  <!-- prize -->
  <text x="600" y="246" text-anchor="middle" font-size="13" fill="#ffffff" fill-opacity="0.55" letter-spacing="2">PRIZE POOL</text>
  <text x="600" y="285" text-anchor="middle" font-size="34" font-weight="900" fill="#ffd9ef">machine UBI</text>
  <!-- oracle stack -->
  <g font-size="13" letter-spacing="1">
    <text x="60" y="430" fill="#00f0ff">◆ Platon</text><text x="60" y="448" fill="#6b7a99" font-size="11">chaos-VRF randomness</text>
    <text x="270" y="430" fill="#00f0ff">◆ Chronos</text><text x="270" y="448" fill="#6b7a99" font-size="11">Wesolowski VDF · on-chain verified</text>
    <text x="640" y="430" fill="#c084fc">◆ LUMEN</text><text x="640" y="448" fill="#6b7a99" font-size="11">EigenTrust reputation weighting</text>
    <text x="980" y="430" fill="#00ff88">★ Hub sponsor</text><text x="980" y="448" fill="#6b7a99" font-size="11">tithes 20% of routing fees</text>
  </g>
</svg>
