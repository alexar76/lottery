# Monorepo → GitHub satellite mapping (source of truth for mirror + release scripts).
# Org defaults to alexar76; override with SATELLITE_GITHUB_ORG env.

org: alexar76

satellites:
  - id: aimarket-courses
    repo: aimarket-courses
    description: "10 hands-on AIMarket academy courses — orchestration, oracles, MCP security, agent economy (en/ru/es)."
    homepage: https://alexar76.github.io/aimarket-courses/
    topics:
      - aimarket
      - ai-agents
      - courses
      - education
      - mcp
      - oracles
      - agent-economy
    license: mit
    paths:
      - courses
    export_layout:
      monorepo_from: courses
    registries: []
    ci:
      - pytest-course-matrix
      - pages-portal
    notes: >
      Monorepo mirror (like aimarket-desktop): root README + one folder per course,
      each with its own README, labs, Colab notebooks, and Pages subpath.
      Portal: alexar76.github.io/aimarket-courses/
      Source of truth: courses/ in the monorepo. Replaces per-course satellite repos.

  - id: profile
    repo: alexar76
    optional: true
    description: "GitHub profile README — ecosystem map for alexar76."
    homepage: https://github.com/alexar76
    topics:
      - github-profile
      - aimarket
      - ai-agents
      - open-source
      - agent-economy
      - developer
    license: mit
    paths:
      - scripts/profile-readme/README.md
      - scripts/profile-readme/assets/
    registries: []
    ci: []
    notes: >
      Special satellite: target repo is the GitHub PROFILE repo
      (org/username == alexar76/alexar76). Only README.md + assets/ are
      published — no LICENSE / SECURITY.md / mirror banner / governance.
      Canonical source: scripts/profile-readme/README.md. Handled by the
      dedicated export_profile() function in mirror_satellites.sh.
      Optional: skipped in bulk publish until alexar76/alexar76 profile repo exists.

  - id: aimarket-desktop
    repo: aimarket-desktop
    description: "10 desktop & IDE apps for AIMarket — Flutter, Tauri, and VS Code in one Melos monorepo."
    license: mit
    paths:
      - desktop-integrations
    export_layout:
      apps_from: desktop-integrations
      packages_from: desktop-integrations/packages
      # Per-app language packs — colocated with SKU
      language_packs:
        source: desktop-integrations/{app}/language-packs
        target: apps/{app}/language-packs
    registries:
      - github-releases
    ci:
      - flutter-analyze
      - flutter-build-web-matrix
    notes: >
      Depends on aimarket-sdks (Dart) via pub git/path — not vendored in this repo.
      Do NOT embed aimarket-sdks/dart here; use separate aimarket-sdks satellite.

  - id: aimarket-sdks
    repo: aimarket-sdks
    description: "Official AIMarket client SDKs — Dart, TypeScript, and Rust."
    license: mit
    paths:
      - aimarket-sdks
    export_layout:
      root_from: aimarket-sdks
      preserve:
        - dart
        - typescript
        - rust
    registries:
      - pub.dev:aimarket_agent
      - npm:@aimarket/agent
      - crates.io:aimarket-agent
    ci:
      - dart-test
      - typescript-build
      - cargo-test

